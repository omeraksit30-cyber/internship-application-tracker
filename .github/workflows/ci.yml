name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maven-verify:
    name: Maven Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Show Java and Maven versions
        run: |
          java -version
          ./mvnw -version

      - name: Maven verify
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: maven-verify

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Docker and Compose versions
        run: |
          docker --version
          docker compose version

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example config --quiet

      - name: Build Docker image
        run: |
          docker build \
            --tag internship-application-tracker:ci \
            .
